<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Difyナレッジ検索テスター</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles/app.css">
</head>
<body>
  <header class="app-header">
    <div class="title-block">
      <h1>Difyナレッジ検索テスター</h1>
      <p>複数の検索クエリと検索設定をまとめて実行し、Retrieve API の結果を比較します。</p>
    </div>
    <div class="header-actions">
      <button id="settingsToggle" class="button" type="button" aria-expanded="false" aria-controls="connectionPanel">
        <svg class="icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.8"></path>
          <path d="M19.4 15a8 8 0 0 0 .1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L15 6.4h-4L10.6 9a7 7 0 0 0-1.7 1L6.5 9l-2 3.5 2 1.5a8 8 0 0 0 .1 2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.3 2.6h4l.4-2.6a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2.1-1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
        </svg>
        接続設定
      </button>
      <button id="cancelBtn" class="button" type="button" hidden>停止</button>
      <button id="runBtn" class="button primary" type="button">実行</button>
    </div>
  </header>

  <form id="connectionPanel" class="connection-panel" hidden>
    <div class="field">
      <label for="baseUrl">Base URL</label>
      <input id="baseUrl" class="input mono" type="url" placeholder="https://api.dify.ai/v1" autocomplete="url">
    </div>
    <div class="field">
      <label for="apiKey">ナレッジAPIキー</label>
      <div class="key-field">
        <input id="apiKey" class="input mono" type="password" placeholder="Bearer token" autocomplete="off">
        <button id="toggleKey" class="button small" type="button">表示</button>
      </div>
    </div>
    <div class="field">
      <label for="datasetId">Dataset ID</label>
      <input id="datasetId" class="input mono" type="text" placeholder="Knowledge ID / Dataset ID" autocomplete="off">
    </div>
  </form>

  <main class="layout">
    <aside class="controls">
      <section class="panel" aria-labelledby="queryHeading">
        <div class="panel-header">
          <div class="panel-title">
            <h2 id="queryHeading">検索クエリ</h2>
            <span>1行につき1クエリ。空欄は実行時に無視します。</span>
          </div>
          <button id="addQuery" class="button small" type="button">+ 追加</button>
        </div>
        <div id="queryList" class="panel-body"></div>
      </section>

      <section class="panel" aria-labelledby="presetHeading">
        <div class="panel-header">
          <div class="panel-title">
            <h2 id="presetHeading">検索設定</h2>
            <span>プリセットごとに検索方法とパラメータを変えられます。</span>
          </div>
          <button id="addPreset" class="button small" type="button">+ 追加</button>
        </div>
        <div id="presetList" class="panel-body"></div>
      </section>
    </aside>

    <section class="results-pane" aria-live="polite">
      <div class="results-toolbar">
        <div class="panel-title">
          <h2>検索結果</h2>
          <span id="resultSubtitle">実行すると、クエリごとに設定別の結果を並べて表示します。</span>
        </div>
        <div class="summary" id="runSummary"></div>
      </div>
      <div id="messageArea"></div>
      <div id="results"></div>
    </section>
  </main>

  <script type="module" src="./src/renderer/main.mjs"></script>
</body>
</html>
