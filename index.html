<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Difyナレッジ検索テスター</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f6;
      --surface: #ffffff;
      --surface-soft: #eef2f0;
      --surface-strong: #e4e9e6;
      --text: #1f2823;
      --muted: #65716b;
      --subtle: #87918c;
      --border: #d7ded9;
      --border-strong: #b8c4bd;
      --accent: #2f7d57;
      --accent-hover: #256946;
      --accent-soft: #e3f1e9;
      --danger: #b42318;
      --danger-soft: #fde8e4;
      --warning: #916400;
      --warning-soft: #fff3cd;
      --shadow: 0 12px 28px rgba(31, 40, 35, 0.08);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .title-block h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .button:hover {
      border-color: #9ca9a1;
      background: #fbfcfb;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .button.primary:hover {
      border-color: var(--accent-hover);
      background: var(--accent-hover);
    }

    .button.ghost {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .button.ghost:hover {
      border-color: var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .button.danger {
      border-color: #efc4bf;
      background: #fff8f7;
      color: var(--danger);
    }

    .button.small {
      min-height: 30px;
      padding: 0 10px;
      font-size: 12px;
    }

    .icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .connection-panel {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) minmax(220px, 1fr);
      gap: 14px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .connection-panel[hidden] {
      display: none;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field.inline {
      grid-template-columns: 1fr auto;
      align-items: end;
    }

    .field label,
    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .input,
    .select {
      height: 38px;
      padding: 0 10px;
    }

    .textarea {
      min-height: 90px;
      resize: vertical;
      padding: 10px;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 125, 87, 0.14);
    }

    .key-field {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(330px, 410px) minmax(0, 1fr);
      gap: 20px;
      padding: 20px 24px 32px;
    }

    .controls,
    .results-pane {
      min-width: 0;
    }

    .controls {
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      display: grid;
      gap: 2px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .panel-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .query-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .preset-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fbfcfb;
    }

    .preset-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-grid.one {
      grid-template-columns: 1fr;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .segmented label {
      position: relative;
      padding: 0;
      cursor: pointer;
    }

    .segmented label span {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      width: 100%;
      padding: 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      text-align: center;
    }

    .segmented label + label {
      border-left: 1px solid var(--border);
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented input:checked + span {
      background: var(--accent-soft);
      color: var(--accent-hover);
    }

    .weight-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .range {
      width: 100%;
      accent-color: var(--accent);
    }

    .mono {
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }

    .weight-values {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .advanced {
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .advanced summary {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
    }

    .advanced .form-grid {
      margin-top: 10px;
    }

    .results-pane {
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .results-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .summary {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .badge.success {
      border-color: #b9dcc8;
      background: var(--accent-soft);
      color: var(--accent-hover);
    }

    .badge.error {
      border-color: #efc4bf;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .badge.warning {
      border-color: #ecd28d;
      background: var(--warning-soft);
      color: var(--warning);
    }

    .notice {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
    }

    .notice.error {
      border-color: #efc4bf;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .notice.warning {
      border-color: #ecd28d;
      background: var(--warning-soft);
      color: #6b4a00;
    }

    .query-group {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .query-group h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .query-label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 12px;
    }

    .result-card {
      display: grid;
      align-content: start;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fbfcfb;
    }

    .result-card.running {
      border-color: #aecdbb;
      background: #f7fbf8;
    }

    .result-card.error {
      border-color: #efc4bf;
      background: #fff8f7;
    }

    .result-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .result-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .result-title strong {
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    .result-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .record-list {
      display: grid;
      gap: 10px;
    }

    .record {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .record-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .score {
      color: var(--accent-hover);
      font-weight: 750;
    }

    .content {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      max-width: 100%;
      padding: 0 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
    }

    .chip.truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .error-text {
      color: var(--danger);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .details {
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }

    .details summary {
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }

    pre {
      overflow: auto;
      max-height: 260px;
      margin: 8px 0 0;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #f3f5f4;
      color: #27312c;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #c9d7cf;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 1100px) {
      .connection-panel {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .app-header {
        position: static;
        align-items: flex-start;
        padding: 14px 16px;
      }

      .app-header,
      .results-toolbar {
        flex-direction: column;
      }

      .header-actions,
      .results-toolbar {
        align-items: stretch;
        width: 100%;
      }

      .button {
        width: 100%;
      }

      .connection-panel,
      .layout {
        padding-left: 16px;
        padding-right: 16px;
      }

      .form-grid,
      .preset-top {
        grid-template-columns: 1fr;
      }

      .field.inline {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="title-block">
      <h1>Difyナレッジ検索テスター</h1>
      <p>複数の検索クエリと検索設定をまとめて実行し、Retrieve API の結果を比較します。</p>
    </div>
    <div class="header-actions">
      <button id="settingsToggle" class="button" type="button" aria-expanded="false" aria-controls="connectionPanel">
        <svg class="icon" aria-hidden="true" viewBox="0 0 24 24" fill="none">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.8"></path>
          <path d="M19.4 15a8 8 0 0 0 .1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L15 6.4h-4L10.6 9a7 7 0 0 0-1.7 1L6.5 9l-2 3.5 2 1.5a8 8 0 0 0 .1 2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.3 2.6h4l.4-2.6a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2.1-1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"></path>
        </svg>
        接続設定
      </button>
      <button id="cancelBtn" class="button" type="button" hidden>停止</button>
      <button id="runBtn" class="button primary" type="button">実行</button>
    </div>
  </header>

  <form id="connectionPanel" class="connection-panel" hidden>
    <div class="field">
      <label for="baseUrl">Base URL</label>
      <input id="baseUrl" class="input mono" type="url" placeholder="https://api.dify.ai/v1" autocomplete="url">
    </div>
    <div class="field">
      <label for="apiKey">ナレッジAPIキー</label>
      <div class="key-field">
        <input id="apiKey" class="input mono" type="password" placeholder="Bearer token" autocomplete="off">
        <button id="toggleKey" class="button small" type="button">表示</button>
      </div>
    </div>
    <div class="field">
      <label for="datasetId">Dataset ID</label>
      <input id="datasetId" class="input mono" type="text" placeholder="Knowledge ID / Dataset ID" autocomplete="off">
    </div>
  </form>

  <main class="layout">
    <aside class="controls">
      <section class="panel" aria-labelledby="queryHeading">
        <div class="panel-header">
          <div class="panel-title">
            <h2 id="queryHeading">検索クエリ</h2>
            <span>1行につき1クエリ。空欄は実行時に無視します。</span>
          </div>
          <button id="addQuery" class="button small" type="button">+ 追加</button>
        </div>
        <div id="queryList" class="panel-body"></div>
      </section>

      <section class="panel" aria-labelledby="presetHeading">
        <div class="panel-header">
          <div class="panel-title">
            <h2 id="presetHeading">検索設定</h2>
            <span>プリセットごとに検索方法とパラメータを変えられます。</span>
          </div>
          <button id="addPreset" class="button small" type="button">+ 追加</button>
        </div>
        <div id="presetList" class="panel-body"></div>
      </section>
    </aside>

    <section class="results-pane" aria-live="polite">
      <div class="results-toolbar">
        <div class="panel-title">
          <h2>検索結果</h2>
          <span id="resultSubtitle">実行すると、クエリごとに設定別の結果を並べて表示します。</span>
        </div>
        <div class="summary" id="runSummary"></div>
      </div>
      <div id="messageArea"></div>
      <div id="results"></div>
    </section>
  </main>

  <script>
    (() => {
      const STORAGE_KEY = "dify.knowledge.search.tester.v1";
      const MAX_QUERY_LENGTH = 250;
      const DEFAULT_BASE_URL = "https://api.dify.ai/v1";

      const elements = {
        settingsToggle: document.getElementById("settingsToggle"),
        connectionPanel: document.getElementById("connectionPanel"),
        baseUrl: document.getElementById("baseUrl"),
        apiKey: document.getElementById("apiKey"),
        datasetId: document.getElementById("datasetId"),
        toggleKey: document.getElementById("toggleKey"),
        addQuery: document.getElementById("addQuery"),
        queryList: document.getElementById("queryList"),
        addPreset: document.getElementById("addPreset"),
        presetList: document.getElementById("presetList"),
        runBtn: document.getElementById("runBtn"),
        cancelBtn: document.getElementById("cancelBtn"),
        runSummary: document.getElementById("runSummary"),
        messageArea: document.getElementById("messageArea"),
        results: document.getElementById("results"),
        resultSubtitle: document.getElementById("resultSubtitle"),
      };

      const defaultPreset = (name = "Hybrid 0.7 / 0.3") => ({
        id: uid("preset"),
        name,
        searchMethod: "hybrid_search",
        hybridMode: "weighted_score",
        vectorWeight: 0.7,
        embeddingProviderName: "",
        embeddingModelName: "",
        rerankingProviderName: "",
        rerankingModelName: "",
        topK: 3,
        scoreThresholdEnabled: false,
        scoreThreshold: 0.5,
      });

      const state = loadState();
      const runState = {
        running: false,
        abortController: null,
        results: [],
        startedAt: 0,
        finishedAt: 0,
      };

      init();

      function init() {
        renderConnection();
        renderQueries();
        renderPresets();
        renderResults();
        bindEvents();
      }

      function bindEvents() {
        elements.settingsToggle.addEventListener("click", () => {
          const isOpen = !elements.connectionPanel.hidden;
          elements.connectionPanel.hidden = isOpen;
          elements.settingsToggle.setAttribute("aria-expanded", String(!isOpen));
        });

        elements.connectionPanel.addEventListener("submit", (event) => {
          event.preventDefault();
        });

        elements.toggleKey.addEventListener("click", () => {
          const visible = elements.apiKey.type === "text";
          elements.apiKey.type = visible ? "password" : "text";
          elements.toggleKey.textContent = visible ? "表示" : "隠す";
        });

        elements.baseUrl.addEventListener("input", () => {
          state.connection.baseUrl = elements.baseUrl.value.trim();
          saveState();
        });

        elements.apiKey.addEventListener("input", () => {
          state.connection.apiKey = elements.apiKey.value;
          saveState();
        });

        elements.datasetId.addEventListener("input", () => {
          state.connection.datasetId = elements.datasetId.value.trim();
          saveState();
        });

        elements.addQuery.addEventListener("click", () => {
          state.queries.push({ id: uid("query"), text: "" });
          saveState();
          renderQueries();
          const last = elements.queryList.querySelector(".query-row:last-child input");
          if (last)
            last.focus();
        });

        elements.queryList.addEventListener("input", (event) => {
          const input = event.target.closest("[data-query-id]");
          if (!input)
            return;

          const query = state.queries.find(item => item.id === input.dataset.queryId);
          if (!query)
            return;

          query.text = input.value;
          saveState();
        });

        elements.queryList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-action]");
          if (!button)
            return;

          if (button.dataset.action === "delete-query") {
            const id = button.dataset.queryId;
            state.queries = state.queries.filter(query => query.id !== id);
            if (!state.queries.length)
              state.queries.push({ id: uid("query"), text: "" });
            saveState();
            renderQueries();
          }
        });

        elements.addPreset.addEventListener("click", () => {
          state.presets.push(defaultPreset(`設定 ${state.presets.length + 1}`));
          saveState();
          renderPresets();
        });

        elements.presetList.addEventListener("input", handlePresetInput);
        elements.presetList.addEventListener("change", handlePresetInput);
        elements.presetList.addEventListener("click", handlePresetClick);

        elements.runBtn.addEventListener("click", runAll);
        elements.cancelBtn.addEventListener("click", () => {
          if (runState.abortController)
            runState.abortController.abort();
        });
      }

      function loadState() {
        const fallback = {
          connection: {
            baseUrl: DEFAULT_BASE_URL,
            apiKey: "",
            datasetId: "",
          },
          queries: [
            { id: uid("query"), text: "" },
          ],
          presets: [
            defaultPreset("Hybrid weighted 0.7 / 0.3"),
            {
              ...defaultPreset("Hybrid rerank"),
              hybridMode: "reranking_model",
            },
            {
              ...defaultPreset("Semantic"),
              searchMethod: "semantic_search",
              hybridMode: "weighted_score",
            },
          ],
        };

        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw)
            return fallback;

          const parsed = JSON.parse(raw);
          return {
            connection: {
              baseUrl: typeof parsed.connection?.baseUrl === "string" ? parsed.connection.baseUrl : DEFAULT_BASE_URL,
              apiKey: typeof parsed.connection?.apiKey === "string" ? parsed.connection.apiKey : "",
              datasetId: typeof parsed.connection?.datasetId === "string" ? parsed.connection.datasetId : "",
            },
            queries: normalizeQueries(parsed.queries),
            presets: normalizePresets(parsed.presets),
          };
        }
        catch {
          return fallback;
        }
      }

      function normalizeQueries(queries) {
        if (!Array.isArray(queries) || !queries.length)
          return [{ id: uid("query"), text: "" }];

        return queries.map(query => ({
          id: typeof query.id === "string" ? query.id : uid("query"),
          text: typeof query.text === "string" ? query.text : "",
        }));
      }

      function normalizePresets(presets) {
        if (!Array.isArray(presets) || !presets.length)
          return [defaultPreset()];

        return presets.map((preset, index) => sanitizePreset({
          ...defaultPreset(`設定 ${index + 1}`),
          ...preset,
          id: typeof preset.id === "string" ? preset.id : uid("preset"),
        }));
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function renderConnection() {
        elements.baseUrl.value = state.connection.baseUrl || DEFAULT_BASE_URL;
        elements.apiKey.value = state.connection.apiKey || "";
        elements.datasetId.value = state.connection.datasetId || "";
      }

      function renderQueries() {
        elements.queryList.innerHTML = state.queries.map((query, index) => `
          <div class="query-row">
            <input
              class="input"
              type="text"
              maxlength="${MAX_QUERY_LENGTH}"
              data-query-id="${escapeAttr(query.id)}"
              placeholder="検索クエリ ${index + 1}"
              value="${escapeAttr(query.text)}"
            >
            <button class="button small ghost" type="button" data-action="delete-query" data-query-id="${escapeAttr(query.id)}" aria-label="クエリを削除">削除</button>
          </div>
        `).join("");
      }

      function renderPresets() {
        elements.presetList.innerHTML = state.presets.map((rawPreset) => {
          const preset = sanitizePreset(rawPreset);
          Object.assign(rawPreset, preset);
          const isHybrid = preset.searchMethod === "hybrid_search";
          const isWeighted = preset.hybridMode === "weighted_score";
          const keywordWeight = roundWeight(1 - preset.vectorWeight);
          const thresholdDisabled = preset.scoreThresholdEnabled ? "" : "disabled";

          return `
            <section class="preset-card" data-preset-id="${escapeAttr(preset.id)}">
              <div class="preset-top">
                <div class="field">
                  <label>設定名</label>
                  <input class="input" type="text" data-field="name" value="${escapeAttr(preset.name)}" placeholder="設定名">
                </div>
                <button class="button small" type="button" data-action="duplicate-preset" data-preset-id="${escapeAttr(preset.id)}">複製</button>
                <button class="button small ghost" type="button" data-action="delete-preset" data-preset-id="${escapeAttr(preset.id)}">削除</button>
              </div>

              <div class="form-grid">
                <div class="field">
                  <label>検索方法</label>
                  <select class="select" data-field="searchMethod">
                    <option value="hybrid_search" ${selected(preset.searchMethod, "hybrid_search")}>Hybrid</option>
                    <option value="semantic_search" ${selected(preset.searchMethod, "semantic_search")}>Semantic</option>
                    <option value="full_text_search" ${selected(preset.searchMethod, "full_text_search")}>Full-text</option>
                  </select>
                </div>
                <div class="field">
                  <label>top_k</label>
                  <input class="input mono" type="number" min="1" max="50" step="1" data-field="topK" value="${escapeAttr(String(preset.topK))}">
                </div>
              </div>

              ${isHybrid ? `
                <div class="field">
                  <span class="field-label">ハイブリッドモード</span>
                  <div class="segmented">
                    <label>
                      <input type="radio" name="mode-${escapeAttr(preset.id)}" value="weighted_score" data-field="hybridMode" ${isWeighted ? "checked" : ""}>
                      <span>重み付けスコア</span>
                    </label>
                    <label>
                      <input type="radio" name="mode-${escapeAttr(preset.id)}" value="reranking_model" data-field="hybridMode" ${!isWeighted ? "checked" : ""}>
                      <span>Rerankモデル</span>
                    </label>
                  </div>
                </div>

                ${isWeighted ? `
                  <div class="field">
                    <span class="field-label">ベクトル重み / キーワード重み</span>
                    <div class="weight-row">
                      <span class="mono" data-role="vectorValue">${formatWeight(preset.vectorWeight)}</span>
                      <input class="range" type="range" min="0" max="1" step="0.05" data-field="vectorWeight" value="${escapeAttr(String(preset.vectorWeight))}">
                      <span class="mono" data-role="keywordValue">${formatWeight(keywordWeight)}</span>
                    </div>
                    <div class="weight-values">
                      <span>vector_weight</span>
                      <span>keyword_weight = 1.0 - vector_weight</span>
                    </div>
                  </div>
                ` : `
                  <div class="form-grid">
                    <div class="field">
                      <label>Rerank provider</label>
                      <input class="input mono" type="text" data-field="rerankingProviderName" value="${escapeAttr(preset.rerankingProviderName)}" placeholder="cohere">
                    </div>
                    <div class="field">
                      <label>Rerank model</label>
                      <input class="input mono" type="text" data-field="rerankingModelName" value="${escapeAttr(preset.rerankingModelName)}" placeholder="rerank-v3">
                    </div>
                  </div>
                `}

                <details class="advanced">
                  <summary>Embedding 名を明示する場合</summary>
                  <div class="form-grid">
                    <div class="field">
                      <label>Embedding provider</label>
                      <input class="input mono" type="text" data-field="embeddingProviderName" value="${escapeAttr(preset.embeddingProviderName)}" placeholder="空欄可">
                    </div>
                    <div class="field">
                      <label>Embedding model</label>
                      <input class="input mono" type="text" data-field="embeddingModelName" value="${escapeAttr(preset.embeddingModelName)}" placeholder="空欄可">
                    </div>
                  </div>
                </details>
              ` : ""}

              <div class="form-grid">
                <div class="field">
                  <label>スコア閾値</label>
                  <select class="select" data-field="scoreThresholdEnabled">
                    <option value="false" ${!preset.scoreThresholdEnabled ? "selected" : ""}>OFF</option>
                    <option value="true" ${preset.scoreThresholdEnabled ? "selected" : ""}>ON</option>
                  </select>
                </div>
                <div class="field">
                  <label>score_threshold</label>
                  <input class="input mono" type="number" min="0" max="1" step="0.01" data-field="scoreThreshold" value="${escapeAttr(String(preset.scoreThreshold))}" ${thresholdDisabled}>
                </div>
              </div>
            </section>
          `;
        }).join("");
      }

      function handlePresetInput(event) {
        const target = event.target;
        const card = target.closest("[data-preset-id]");
        if (!card || !target.dataset.field)
          return;

        const preset = state.presets.find(item => item.id === card.dataset.presetId);
        if (!preset)
          return;

        const field = target.dataset.field;
        const value = target.type === "radio" ? target.value : target.value;

        if (field === "name") {
          preset.name = value;
        }
        else if (field === "searchMethod") {
          preset.searchMethod = value;
          saveState();
          renderPresets();
          return;
        }
        else if (field === "hybridMode") {
          preset.hybridMode = value;
          saveState();
          renderPresets();
          return;
        }
        else if (field === "vectorWeight") {
          preset.vectorWeight = roundWeight(Number(value));
          updateWeightLabels(card, preset.vectorWeight);
        }
        else if (field === "topK") {
          preset.topK = clampInteger(Number(value), 1, 50, 3);
        }
        else if (field === "scoreThresholdEnabled") {
          preset.scoreThresholdEnabled = value === "true";
          const thresholdInput = card.querySelector('[data-field="scoreThreshold"]');
          if (thresholdInput)
            thresholdInput.disabled = !preset.scoreThresholdEnabled;
        }
        else if (field === "scoreThreshold") {
          preset.scoreThreshold = clampNumber(Number(value), 0, 1, 0.5);
        }
        else if (field === "rerankingProviderName") {
          preset.rerankingProviderName = value.trim();
        }
        else if (field === "rerankingModelName") {
          preset.rerankingModelName = value.trim();
        }
        else if (field === "embeddingProviderName") {
          preset.embeddingProviderName = value.trim();
        }
        else if (field === "embeddingModelName") {
          preset.embeddingModelName = value.trim();
        }

        saveState();
      }

      function handlePresetClick(event) {
        const button = event.target.closest("[data-action]");
        if (!button)
          return;

        const id = button.dataset.presetId;
        const index = state.presets.findIndex(preset => preset.id === id);
        if (index === -1)
          return;

        if (button.dataset.action === "duplicate-preset") {
          const copy = {
            ...JSON.parse(JSON.stringify(state.presets[index])),
            id: uid("preset"),
            name: `${state.presets[index].name} copy`,
          };
          state.presets.splice(index + 1, 0, copy);
          saveState();
          renderPresets();
        }

        if (button.dataset.action === "delete-preset") {
          state.presets.splice(index, 1);
          if (!state.presets.length)
            state.presets.push(defaultPreset());
          saveState();
          renderPresets();
        }
      }

      async function runAll() {
        if (runState.running)
          return;

        const validation = validateRun();
        if (validation.length) {
          showMessage(validation.join("\n"), "error");
          if (validation.some(message => message.includes("Base URL") || message.includes("APIキー") || message.includes("Dataset ID"))) {
            elements.connectionPanel.hidden = false;
            elements.settingsToggle.setAttribute("aria-expanded", "true");
          }
          return;
        }

        const queries = state.queries
          .map(query => ({ ...query, text: query.text.trim() }))
          .filter(query => query.text);
        const presets = state.presets.map(sanitizePreset);
        const combinations = [];

        for (const query of queries) {
          for (const preset of presets) {
            const requestBody = {
              query: query.text,
              retrieval_model: buildRetrievalModel(preset),
            };
            combinations.push({
              id: uid("run"),
              queryId: query.id,
              queryText: query.text,
              presetId: preset.id,
              presetName: preset.name,
              requestBody,
              status: "pending",
              records: [],
              error: "",
              elapsedMs: 0,
            });
          }
        }

        runState.running = true;
        runState.abortController = new AbortController();
        runState.results = combinations;
        runState.startedAt = performance.now();
        runState.finishedAt = 0;
        setRunningUi(true);
        showMessage("", "");
        renderResults();

        let cursor = 0;
        const workerCount = Math.min(4, combinations.length);

        const worker = async () => {
          while (cursor < combinations.length && !runState.abortController.signal.aborted) {
            const index = cursor;
            cursor += 1;
            await runCombination(runState.results[index], runState.abortController.signal);
            renderResults();
          }
        };

        try {
          await Promise.all(Array.from({ length: workerCount }, worker));
        }
        finally {
          runState.finishedAt = performance.now();
          runState.running = false;
          setRunningUi(false);
          if (runState.abortController.signal.aborted)
            showMessage("実行を停止しました。完了済みの結果だけ表示しています。", "warning");
          runState.abortController = null;
          renderResults();
        }
      }

      async function runCombination(item, signal) {
        item.status = "running";
        item.startedAt = performance.now();
        renderResults();

        const url = `${normalizeBaseUrl(state.connection.baseUrl)}/datasets/${encodeURIComponent(state.connection.datasetId.trim())}/retrieve`;

        try {
          const response = await retrieve(url, state.connection.apiKey, item.requestBody, item.id, signal);
          const payload = response.payload;

          if (!response.ok) {
            item.status = "error";
            item.error = response.status === 0
              ? formatNetworkError(new Error(response.error || "Request failed."))
              : formatApiError(response.status, payload);
            return;
          }

          const records = Array.isArray(payload.records) ? payload.records : [];
          item.records = records.sort((a, b) => getScore(b) - getScore(a));
          item.status = "success";
        }
        catch (error) {
          if (error.name === "AbortError") {
            item.status = "error";
            item.error = "停止されました。";
          }
          else {
            item.status = "error";
            item.error = formatNetworkError(error);
          }
        }
        finally {
          item.elapsedMs = Math.round(performance.now() - item.startedAt);
        }
      }

      function validateRun() {
        const errors = [];
        const baseUrl = state.connection.baseUrl.trim();
        const apiKey = state.connection.apiKey.trim();
        const datasetId = state.connection.datasetId.trim();
        const activeQueries = state.queries.map(query => query.text.trim()).filter(Boolean);

        if (!baseUrl)
          errors.push("Base URL を入力してください。");
        if (!apiKey)
          errors.push("ナレッジAPIキーを入力してください。");
        if (!datasetId)
          errors.push("Dataset ID を入力してください。");
        if (!activeQueries.length)
          errors.push("検索クエリを1件以上入力してください。");

        for (const query of activeQueries) {
          if (query.length > MAX_QUERY_LENGTH)
            errors.push(`検索クエリは ${MAX_QUERY_LENGTH} 文字以内にしてください: ${query.slice(0, 30)}...`);
        }

        return errors;
      }

      function buildRetrievalModel(preset) {
        const model = {
          search_method: preset.searchMethod,
          top_k: preset.topK,
          score_threshold_enabled: preset.scoreThresholdEnabled,
          score_threshold: preset.scoreThreshold,
        };

        if (preset.searchMethod !== "hybrid_search") {
          model.reranking_enable = false;
          return model;
        }

        const vectorWeight = roundWeight(preset.vectorWeight);
        const keywordWeight = roundWeight(1 - vectorWeight);

        model.reranking_enable = preset.hybridMode === "reranking_model";
        model.reranking_mode = preset.hybridMode;
        model.reranking_model = {
          reranking_provider_name: preset.rerankingProviderName || "",
          reranking_model_name: preset.rerankingModelName || "",
        };
        model.weights = {
          weight_type: "customized",
          vector_setting: {
            vector_weight: vectorWeight,
            embedding_provider_name: preset.embeddingProviderName || "",
            embedding_model_name: preset.embeddingModelName || "",
          },
          keyword_setting: {
            keyword_weight: keywordWeight,
          },
        };

        return model;
      }

      function renderResults() {
        renderSummary();

        if (!runState.results.length) {
          elements.results.innerHTML = `
            <div class="notice">
              まだ検索結果はありません。接続設定、検索クエリ、検索設定を入力して「実行」を押してください。
              デスクトップ版ではアプリ側からAPIを呼び出すため、通常のブラウザCORS制約を受けません。
            </div>
          `;
          return;
        }

        const groups = groupBy(runState.results, item => item.queryText);
        elements.results.innerHTML = "";

        for (const [queryText, items] of groups) {
          const group = document.createElement("section");
          group.className = "query-group";

          const label = document.createElement("div");
          label.className = "query-label";
          label.append(
            textEl("span", "query"),
            textEl("span", `${items.length} settings`),
          );

          const title = document.createElement("h3");
          title.textContent = queryText;

          const grid = document.createElement("div");
          grid.className = "result-grid";

          for (const item of items)
            grid.append(renderResultCard(item));

          group.append(label, title, grid);
          elements.results.append(group);
        }
      }

      function renderResultCard(item) {
        const card = document.createElement("article");
        card.className = `result-card ${item.status}`;

        const head = document.createElement("div");
        head.className = "result-head";

        const title = document.createElement("div");
        title.className = "result-title";
        const name = document.createElement("strong");
        name.textContent = item.presetName;
        const meta = document.createElement("span");
        meta.textContent = describeRequest(item.requestBody.retrieval_model);
        title.append(name, meta);

        const badge = statusBadge(item);
        head.append(title, badge);
        card.append(head);

        if (item.status === "pending") {
          card.append(textEl("div", "待機中", "notice"));
        }
        else if (item.status === "running") {
          const notice = document.createElement("div");
          notice.className = "notice";
          notice.append(textEl("span", "検索中 "), spinner());
          card.append(notice);
        }
        else if (item.status === "error") {
          const error = document.createElement("div");
          error.className = "error-text";
          error.textContent = item.error;
          card.append(error);
        }
        else if (!item.records.length) {
          card.append(textEl("div", "records は空でした。top_k、閾値、検索方法を変えて再実行してください。", "notice warning"));
        }
        else {
          const list = document.createElement("div");
          list.className = "record-list";
          item.records.forEach((record, index) => list.append(renderRecord(record, index)));
          card.append(list);
        }

        const details = document.createElement("details");
        details.className = "details";
        const summary = document.createElement("summary");
        summary.textContent = "Request body";
        const pre = document.createElement("pre");
        pre.textContent = JSON.stringify(item.requestBody, null, 2);
        details.append(summary, pre);
        card.append(details);

        return card;
      }

      function renderRecord(record, index) {
        const segment = record.segment || {};
        const documentName = segment.document?.name || record.document?.name || "document unknown";
        const position = segment.position ?? record.position ?? "-";
        const keywords = Array.isArray(segment.keywords) ? segment.keywords : [];
        const content = segment.content || record.content || "";
        const score = getScore(record);

        const item = document.createElement("section");
        item.className = "record";

        const top = document.createElement("div");
        top.className = "record-top";
        const rank = document.createElement("span");
        rank.textContent = `#${index + 1}`;
        const scoreEl = document.createElement("span");
        scoreEl.className = "score mono";
        scoreEl.textContent = `score ${Number.isFinite(score) ? score.toFixed(6) : "-"}`;
        top.append(rank, scoreEl);

        const body = document.createElement("p");
        body.className = "content";
        body.textContent = content || "(content empty)";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.append(chip(`document: ${documentName}`, true));
        meta.append(chip(`position: ${position}`, false, "mono"));
        if (keywords.length) {
          for (const keyword of keywords)
            meta.append(chip(`keyword: ${keyword}`, true));
        }

        item.append(top, body, meta);
        return item;
      }

      function renderSummary() {
        const total = runState.results.length;
        if (!total) {
          elements.runSummary.innerHTML = "";
          elements.resultSubtitle.textContent = "実行すると、クエリごとに設定別の結果を並べて表示します。";
          return;
        }

        const success = runState.results.filter(item => item.status === "success").length;
        const error = runState.results.filter(item => item.status === "error").length;
        const running = runState.results.filter(item => item.status === "running").length;
        const pending = runState.results.filter(item => item.status === "pending").length;
        const topScore = Math.max(
          ...runState.results.flatMap(item => item.records.map(getScore)).filter(Number.isFinite),
        );
        const elapsed = runState.running
          ? Math.round(performance.now() - runState.startedAt)
          : Math.round(runState.finishedAt - runState.startedAt);

        elements.resultSubtitle.textContent = `${total} 件の組み合わせを比較しています。`;
        elements.runSummary.innerHTML = "";
        elements.runSummary.append(
          badgeEl(`${success}/${total} success`, "success"),
          error ? badgeEl(`${error} error`, "error") : badgeEl("0 error"),
          running || pending ? badgeEl(`${running} running / ${pending} pending`, "warning") : badgeEl("done"),
          badgeEl(`top ${Number.isFinite(topScore) ? topScore.toFixed(6) : "-"}`, ""),
          badgeEl(`${elapsed} ms`, ""),
        );
      }

      function statusBadge(item) {
        if (item.status === "running") {
          const badge = badgeEl("running", "warning");
          badge.prepend(spinner());
          return badge;
        }
        if (item.status === "success")
          return badgeEl(`${item.records.length} records / ${item.elapsedMs} ms`, "success");
        if (item.status === "error")
          return badgeEl("error", "error");
        return badgeEl("pending", "");
      }

      async function parseResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json"))
          return response.json();

        return response.text();
      }

      async function retrieve(url, apiKey, body, requestId, signal) {
        if (window.difyDesktop?.retrieve)
          return retrieveThroughDesktop(url, apiKey, body, requestId, signal);

        const response = await fetch(url, {
          method: "POST",
          headers: {
            "Authorization": authorizationHeader(apiKey),
            "Content-Type": "application/json",
          },
          body: JSON.stringify(body),
          signal,
        });

        return {
          ok: response.ok,
          status: response.status,
          payload: await parseResponse(response),
        };
      }

      function retrieveThroughDesktop(url, apiKey, body, requestId, signal) {
        return new Promise((resolve, reject) => {
          const abort = () => {
            window.difyDesktop.cancel(requestId).catch(() => {});
            reject(createAbortError());
          };

          if (signal.aborted) {
            abort();
            return;
          }

          signal.addEventListener("abort", abort, { once: true });

          window.difyDesktop.retrieve({ requestId, url, apiKey, body })
            .then((response) => {
              if (response?.cancelled) {
                reject(createAbortError());
                return;
              }

              resolve(response);
            })
            .catch(reject)
            .finally(() => {
              signal.removeEventListener("abort", abort);
            });
        });
      }

      function createAbortError() {
        try {
          return new DOMException("停止されました。", "AbortError");
        }
        catch {
          const error = new Error("停止されました。");
          error.name = "AbortError";
          return error;
        }
      }

      function formatApiError(status, payload) {
        if (typeof payload === "string")
          return `HTTP ${status}\n${payload || "(empty response)"}`;

        const message = payload.message || payload.error || payload.description || JSON.stringify(payload, null, 2);
        if (status === 401)
          return `HTTP 401 Unauthorized\nAPIキーが正しいか、Knowledge APIキーを使っているか確認してください。\n${message}`;
        if (status === 404)
          return `HTTP 404 Not Found\nBase URL と Dataset ID を確認してください。\n${message}`;

        return `HTTP ${status}\n${message}`;
      }

      function formatNetworkError(error) {
        const message = error instanceof Error ? error.message : String(error);
        if (message.toLowerCase().includes("failed to fetch")) {
          return [
            "Fetch に失敗しました。",
            "ブラウザのCORS制約、Base URLの誤り、ネットワーク、またはHTTPS証明書を確認してください。",
            "file:// から直接開く場合、セルフホストDify側でOrigin許可が必要になることがあります。",
            `detail: ${message}`,
          ].join("\n");
        }

        if (window.difyDesktop?.retrieve) {
          return [
            "API呼び出しに失敗しました。",
            "Base URL、Dataset ID、ネットワーク、HTTPS証明書を確認してください。",
            `detail: ${message}`,
          ].join("\n");
        }

        return message;
      }

      function describeRequest(model) {
        const parts = [
          model.search_method,
          `top_k=${model.top_k}`,
        ];

        if (model.search_method === "hybrid_search") {
          parts.push(model.reranking_mode);
          if (model.reranking_mode === "weighted_score") {
            parts.push(`v=${formatWeight(model.weights.vector_setting.vector_weight)}`);
            parts.push(`k=${formatWeight(model.weights.keyword_setting.keyword_weight)}`);
          }
          else {
            parts.push(model.reranking_model.reranking_model_name || "rerank model empty");
          }
        }

        if (model.score_threshold_enabled)
          parts.push(`threshold=${model.score_threshold}`);

        return parts.join(" / ");
      }

      function setRunningUi(running) {
        elements.runBtn.disabled = running;
        elements.cancelBtn.hidden = !running;
      }

      function showMessage(message, type) {
        elements.messageArea.innerHTML = "";
        if (!message)
          return;

        const notice = document.createElement("div");
        notice.className = `notice ${type || ""}`.trim();
        notice.textContent = message;
        elements.messageArea.append(notice);
      }

      function sanitizePreset(preset) {
        return {
          id: preset.id || uid("preset"),
          name: String(preset.name || "設定"),
          searchMethod: ["hybrid_search", "semantic_search", "full_text_search"].includes(preset.searchMethod)
            ? preset.searchMethod
            : "hybrid_search",
          hybridMode: ["weighted_score", "reranking_model"].includes(preset.hybridMode)
            ? preset.hybridMode
            : "weighted_score",
          vectorWeight: roundWeight(clampNumber(Number(preset.vectorWeight), 0, 1, 0.7)),
          embeddingProviderName: String(preset.embeddingProviderName || ""),
          embeddingModelName: String(preset.embeddingModelName || ""),
          rerankingProviderName: String(preset.rerankingProviderName || ""),
          rerankingModelName: String(preset.rerankingModelName || ""),
          topK: clampInteger(Number(preset.topK), 1, 50, 3),
          scoreThresholdEnabled: Boolean(preset.scoreThresholdEnabled),
          scoreThreshold: clampNumber(Number(preset.scoreThreshold), 0, 1, 0.5),
        };
      }

      function normalizeBaseUrl(value) {
        return (value || DEFAULT_BASE_URL).trim().replace(/\/+$/, "");
      }

      function authorizationHeader(value) {
        const trimmed = String(value || "").trim();
        return /^Bearer\s+/i.test(trimmed) ? trimmed : `Bearer ${trimmed}`;
      }

      function getScore(record) {
        const score = Number(record.score ?? record.segment?.score);
        return Number.isFinite(score) ? score : Number.NEGATIVE_INFINITY;
      }

      function groupBy(items, getKey) {
        const map = new Map();
        for (const item of items) {
          const key = getKey(item);
          if (!map.has(key))
            map.set(key, []);
          map.get(key).push(item);
        }
        return map;
      }

      function updateWeightLabels(card, vectorWeight) {
        const vector = card.querySelector('[data-role="vectorValue"]');
        const keyword = card.querySelector('[data-role="keywordValue"]');
        if (vector)
          vector.textContent = formatWeight(vectorWeight);
        if (keyword)
          keyword.textContent = formatWeight(1 - vectorWeight);
      }

      function selected(current, expected) {
        return current === expected ? "selected" : "";
      }

      function formatWeight(value) {
        return roundWeight(value).toFixed(2);
      }

      function roundWeight(value) {
        return Math.round(clampNumber(Number(value), 0, 1, 0.7) * 100) / 100;
      }

      function clampInteger(value, min, max, fallback) {
        if (!Number.isFinite(value))
          return fallback;
        return Math.max(min, Math.min(max, Math.round(value)));
      }

      function clampNumber(value, min, max, fallback) {
        if (!Number.isFinite(value))
          return fallback;
        return Math.max(min, Math.min(max, value));
      }

      function uid(prefix) {
        const random = Math.random().toString(36).slice(2, 9);
        return `${prefix}_${Date.now().toString(36)}_${random}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }

      function textEl(tag, text, className = "") {
        const node = document.createElement(tag);
        if (className)
          node.className = className;
        node.textContent = text;
        return node;
      }

      function badgeEl(text, type = "") {
        const badge = document.createElement("span");
        badge.className = `badge ${type}`.trim();
        badge.textContent = text;
        return badge;
      }

      function chip(text, truncate = false, extraClass = "") {
        const node = document.createElement("span");
        node.className = `chip ${truncate ? "truncate" : ""} ${extraClass}`.trim();
        node.textContent = text;
        return node;
      }

      function spinner() {
        const node = document.createElement("span");
        node.className = "spinner";
        node.setAttribute("aria-hidden", "true");
        return node;
      }
    })();
  </script>
</body>
</html>
